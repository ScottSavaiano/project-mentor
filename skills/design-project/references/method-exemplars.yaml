# Method Exemplar Articles — machine-readable manifest
# Consumed by the fetch-articles skill (scripts/fetch_articles.py).
# The prose companion (method-exemplars.md, same directory) is the mentor-facing
# source of truth for annotations; this file carries only what fetching needs.
#
# fetch: script  -> the URL serves PDFs to non-browser clients (verified 2026-06-04)
# fetch: browser -> the host blocks scripted clients; a human downloads via the URL
#                   into the staging directory as <slug>.pdf (see fetch-articles SKILL.md)
#
# Last verified: 2026-06-04 (Cowork — every fetch:script URL tested with a scripted
# client; every fetch:browser URL verified reachable in a browser context)
# Updated: 2026-06-19 (Cowork — causal-graphs handoff: six entries added. New item 13
# "Causal-graphical modeling and discovery" (Zhu/Tay/Zhang 2026 gold OA; Quintana 2023
# educator-staged). Item 2 DAG-for-identification subsection (Rohrer 2018 gold OA;
# Elwert & Winship 2014 educator-staged; Feng 2024 educator-staged; Wodtke/Harding/Elwert
# 2011 PMC free). Catch-all renumbered 13->14. Citations/DOIs verified 2026-06-19; the new
# fetch URLs still need the per-URL fetch test at staging. Pending educator ratification.)
# Updated: 2026-06-20 (Cowork — two paywalled exemplars swapped for open-access equivalents:
# feng-2024 -> weidlich-2022 (Journal of Learning Analytics, gold OA, education DAG primer);
# quintana-2023 -> colineaux-2025 (IJERPH, gold OA, applied causal discovery in social epi).
# weidlich fetched+staged (587a4de); colineaux is gold OA but bot-blocks scripts -> browser-download.
# Pending educator ratification.)

