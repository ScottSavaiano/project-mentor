# Project Mentor — Hermes profile configuration
#
# Part of the Hermes Research Curriculum at Bronx Science.
# Authoritative source: https://github.com/ScottSavaiano/project-mentor
#
# This file is one of three distribution files that ship in the
# project-mentor repository, alongside SOUL.md and distribution.yaml.
# On `hermes profile update`, config.yaml is preserved by default (the
# installer may have tuned it for their machine); pass --force-config
# to reset it to the repo version.

# -------------------------------------------------------------------
# Main model
# -------------------------------------------------------------------
# The mentor handles the highest-judgment work in the program — research
# problem identification, gap analysis, methodology design, the Socratic
# stage-skills. This is the place we are willing to pay for capability.
#
# DEFAULT: Claude Opus 4.7 routed through OpenRouter.
# NO automatic fallback. Judgment-heavy mentor work must not silently
# degrade to a weaker model. If Opus is unavailable or hits a budget cap,
# the student switches manually with the `/model` slash command — a
# deliberate, conscious step. Skills may RECOMMEND elevation or
# de-escalation at appropriate moments; the student acts. (See the
# implementation plan, Phase 0, "Default model per profile.")

model:
  provider: openrouter
  default: anthropic/claude-opus-4.7
  base_url: ''
  api_mode: chat_completions

# -------------------------------------------------------------------
# Model aliases
# -------------------------------------------------------------------
# Named shortcuts for the `/model <alias>` slash command in the TUI.
# Students learn these in Lesson 5 ("Model Selection as a Methodological
# Act") and use them through the cross-surface round-trip workflow:
# `/model <alias> --global` in the TUI, restart gateway, refresh
# OpenWebUI. (Plain `/model <alias>` without --global only swaps the
# TUI's own session and does NOT change what OpenWebUI sees.)
#
# Vocabulary is deliberately methodological, not utilitarian. Names
# describe what the STUDENT is doing — quick vs careful work — rather
# than what the model is (cheap/fast/heavy). This reinforces the
# lesson's framing: model selection is a methodological act, not an
# optimization knob.
#
# The mentor offers two aliases:
#   - `default` — Opus 4.7, the mentor's architectural default.
#   - `quick`   — Haiku 4.5, for short low-stakes interactions like a
#                 clarifying question or a quick lookup.
#
# The mentor does NOT offer `careful` because its default IS Opus, so
# a separate `careful` alias would be redundant. The research and review
# agents will include `careful` because their defaults are lighter; the
# mentor's omission itself teaches an architectural fact.

model_aliases:
  default:
    model: anthropic/claude-opus-4.7
    provider: openrouter
  quick:
    model: anthropic/claude-haiku-4.5
    provider: openrouter

# -------------------------------------------------------------------
# Auxiliary slots
# -------------------------------------------------------------------
# Hermes has eight auxiliary task slots — side-jobs the agent offloads
# to a separate model. Each defaults to `auto` (use the main model).
#
# v0.1.1 cost-discipline decision: route the five mechanical slots to
# Haiku 4.5; leave the three quality/safety-critical slots on auto so
# they inherit the main reasoning model (Opus 4.7).
#
# Routed to Haiku 4.5 (mechanical — Opus is overkill):
#   - web_extract    — pulling structured content from fetched web pages
#   - vision         — image / chart / OCR processing
#   - session_search — full-text search over prior sessions
#   - mcp            — auxiliary calls in the MCP path
#   - skills_hub     — skill discovery and selection
#
# Left on auto (use Opus — the main reasoning model):
#   - title       — chat session titles; the index for educator review
#                   of student work in Sessions tab and OpenWebUI history.
#   - compression — context summarization quality matters; bad
#                   compression means the agent silently forgets earlier
#                   conversation work mid-session.
#   - approval    — safety-critical; judges whether agent-initiated
#                   actions need user permission. Weaker model here has
#                   real safety consequences.
#
# This is the standard pattern documented in the platform primer
# Section 2; routing mechanical slots to a cheaper model is not
# curriculum-specific. Cost savings on a 60-student cohort over an
# academic year are meaningful, especially for web_extract and
# session_search, which fire frequently.

auxiliary:
  web_extract:
    provider: openrouter
    model: anthropic/claude-haiku-4.5
  vision:
    provider: openrouter
    model: anthropic/claude-haiku-4.5
  session_search:
    provider: openrouter
    model: anthropic/claude-haiku-4.5
  mcp:
    provider: openrouter
    model: anthropic/claude-haiku-4.5
  skills_hub:
    provider: openrouter
    model: anthropic/claude-haiku-4.5

# -------------------------------------------------------------------
# Terminal
# -------------------------------------------------------------------
# All three student-facing profiles (mentor, research, review) share a
# single workspace at ~/research-curriculum/ on the student's machine,
# set as `terminal.cwd`. This is the shared-workspace architecture: the
# profiles are state-isolated (memory, sessions per profile) but
# filesystem-shared. Knowledge transfer between agents happens through
# the workspace files — `project_design.md`, `reference_articles.md`,
# `paper_structure.md`, `decisions.md`, `working_paper.md`,
# `project_paper_status.md`, and the `journals/` directory.
#
# On the `local` backend, `cwd: "."` means "the directory Hermes was
# launched from" — NOT the profile directory. An explicit absolute path
# is required.
#
# IMPORTANT: the value below is the documented intent. The student
# install script (`student-install.sh`) rewrites this to the correct
# absolute path on first install — typically
# `/Users/<username>/research-curriculum` on macOS, or
# `/home/<username>/research-curriculum` on Windows WSL2. The educator
# can confirm whether Hermes expands the leading `~` itself on the
# local backend; if it does, the install-time rewrite is belt-and-suspenders.

terminal:
  backend: local
  cwd: ~/research-curriculum
  timeout: 180
