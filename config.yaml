# Project Mentor — Hermes profile configuration
#
# Part of the Hermes Research Curriculum at Bronx Science.
# Authoritative source: https://github.com/ScottSavaiano/project-mentor
#
# Ships alongside SOUL.md and distribution.yaml. On `hermes profile update`,
# config.yaml is preserved by default; pass --force-config to reset it to the
# repo version (and re-run student-install.sh to set terminal.cwd).
#
# NOTE: the agent cannot edit this file with its own tools (Hermes refuses
# patch/write_file on config.yaml). Change settings with `hermes --profile
# project-mentor config set <key> <value>`. Edits apply on the next `/new` session.
#
# Version 0.3.6 (2026-06-25): defensive `delegation.model` pin — `delegation.model: ''` → `google/gemma-4-26b-a4b-it`
#   (provider already openrouter). Rationale: Hermes v0.17.0 makes TOP-LEVEL `delegate_task` BACKGROUND-BY-DEFAULT
#   (`_model_background_value`: "Delegations from the top-level agent always run in the background — the model does
#   not choose"). The curriculum is NOT adopting subagent delegation (decision-log 2026-06-25 — DEFER), but with
#   background-by-default an accidental/learned delegation would otherwise run on whatever the main tier is and bleed
#   to the Wizard (Kimi) tier during a `/model careful` escalation. Pinning to Gemma is a cheap defensive floor so any
#   stray subagent stays cheap. Reverses the prior deliberate-empty/inherit choice below (the mentor delegates rarely,
#   so a cheap floor costs nothing). research-agent was already pinned (v0.1.0); review-agent carries the pin at Tier 3.
#
# Version 0.3.5 (2026-06-23): added a deterministic Kimi fallback — `provider_routing.order` is now
#   [nextbit, siliconflow, modelrun]. SiliconFlow (fp8) was measured the slowest + least reliable Kimi
#   endpoint of 20 (TTFT p50 5.9s, 89% uptime); kept as primary for fp8 quality at the careful tier, but
#   ModelRun (fp4, fast, 99.9% uptime, verified reasoning-capable 6/6) now backs it so the ~11% downtime
#   never fails an escalation. DeepInfra/Parasail were rejected — they error whenever reasoning is on.
#
# Version 0.3.4 (2026-06-23): set `agent.reasoning_effort: high` (was Hermes default) for program-wide
#   consistency with the research-agent and teacher-admin profiles (both high). Tradeoff: strengthens the
#   Kimi careful tier's reasoning but adds thinking-token cost on every Gemma daily turn (the mentor's
#   highest-volume surface). MEASURED 2026-06-23 (gemma-4-26b, 3 runs/level): low≈medium≈high (~700-820
#   reasoning tokens — the effort knob barely scales Gemma); the real step is reasoning ON vs OFF (ON ≈
#   doubles completion, ~600→~1300 tokens/turn). So 'high' costs ~nothing over 'medium' here (~$15/cohort/yr
#   worst case off→high). Dialing to 'medium' would NOT meaningfully cut daily burn; the only effective daily
#   lever is OFF (rejected — dumbs the model). The effort LEVEL is a real cost lever mainly on the Kimi tier.
#
# Version 0.3.3 (2026-06-23): pinned the Gemma daily tier to NextBit (bf16, 99.7% uptime, 5/5 live)
#   via `provider_routing.order: [nextbit, siliconflow]`. NextBit was chosen specifically because it
#   serves Gemma but NOT Kimi — so a single profile-wide `order` routes Gemma→NextBit (bf16) AND
#   Kimi→SiliconFlow (fp8) with no collision. Novita (bf16, 99.9%) was the first pick but it ALSO serves
#   Kimi, so [novita, siliconflow] silently sent Kimi to Novita (unknown quant) and defeated the fp8 pin
#   — rejected. DekaLLM (cheaper bf16, $0.06) failed 5/5 live calls — rejected. allow_fallbacks stays ON.
#
# Version 0.3.2 (2026-06-23): added `provider_routing.order: [siliconflow]` — pins the Kimi
#   careful tier to SiliconFlow, the only fp8 Kimi K2.6 endpoint of 20 (also ZDR-listed). Lowercase slug
#   verified to route on the live API; profile-wide but harmless to Gemma/Opus (they fall back).
#
# Version 0.3.1 (2026-06-23): corrected for verified Hermes behaviors (decision-log
#   2026-06-23; primer §8/§10). Changes from 0.3.0:
#   - **`@preset/…` removed — Hermes has no preset mechanism.** The careful tier and the
#     fallback now use the plain model id `moonshotai/kimi-k2.6` (note the `ai`).
#   - ZDR for Kimi now rides the OpenRouter **account-level** enforcement (already set),
#     not a preset provider-pin.
#   - Kimi reasoning: keep it ON at full strength. The effort knob is `agent.reasoning_effort`
#     (global; verified `chat_completions.py` maps it to Kimi's top-level `reasoning_effort`) —
#     NOT `none`, which would dumb the model down. `display.show_reasoning: false` hides the trace
#     (display-only). The occasional inline CoT *leak* is a provider-routing artifact, not an
#     effort/show_reasoning matter — fix by pinning Kimi's OpenRouter backend if it resurfaces.
#     (Corrects the earlier "set effort none/desktop-preset" note. See decision-log 2026-06-23.)
#   - **Auxiliary pin extended to all 14 slots** (was 8) — Hermes exposes 14.
#   - Added a `delegation:` block (subagent model) and `model.persist_switch_by_default: false`.
#
# Version 0.3.0 (2026-06-18): all-OpenRouter; Daily=Gemma, Wizard=Kimi-preset (superseded —
#   the `@preset` references did not work; see 0.3.1).
# Version 0.2.x: Haiku-default / Opus-careful (superseded).

# -------------------------------------------------------------------
# Main model — Daily tier (Gemma 4 26B via OpenRouter)
# -------------------------------------------------------------------
# The everyday/startup model. Private (ZDR + account guardrails), low-cost, voice-validated
# on the tuned SOUL. See decision-history §11.
model:
  provider: openrouter
  default: google/gemma-4-26b-a4b-it
  base_url: ''
  api_mode: chat_completions
  # Switches (picker or /model) are SESSION-ONLY — they do NOT rewrite this file.
  # (Hermes default is true = persist; false is the curriculum's choice so careful↔default
  # upgrades never silently change the baseline. Verified 2026-06-23.)
  persist_switch_by_default: false

# -------------------------------------------------------------------
# Reasoning — keep it ON at full strength; hide the trace from students
# -------------------------------------------------------------------
# Reasoning EFFORT is the `agent.reasoning_effort` knob (global; verified `chat_completions.py`
# maps it to Kimi's top-level `reasoning_effort`). Keep Kimi at full strength — do NOT set it to
# `none`/disabled (that dumbs the model down). `display.show_reasoning: false` (also the Hermes
# default) hides the reasoning recap from students — display-only; the model still reasons. It does
# NOT stop an inline-CoT *leak* (a provider-routing artifact — a backend emitting reasoning in
# content — fixed by pinning Kimi's OpenRouter backend if it resurfaces). DECIDED 2026-06-23:
# `agent.reasoning_effort: high` (set below) — program-wide consistency with the research-agent and
# teacher-admin profiles. It helps the Kimi careful tier's reasoning but adds thinking-token cost on
# every Gemma daily turn. Measured 2026-06-23: on Gemma, low≈medium≈high (the effort knob barely scales
# it) — the cost is reasoning ON vs OFF (~2x completion), so 'high' costs ~nothing over 'medium' (~$15/
# cohort/yr worst case). Never set it to `none` (that disables thinking and dumbs the model down).
agent:
  reasoning_effort: high
display:
  show_reasoning: false

# -------------------------------------------------------------------
# Fallback model — single-shot rescue if the Daily model errors
# -------------------------------------------------------------------
# A different-vendor rescue (Gemma→Gemma is useless once Gemma is the main). Plain id, since
# `@preset` is unsupported. ZDR via account-level enforcement.
fallback_model:
  provider: openrouter
  model: moonshotai/kimi-k2.6

# -------------------------------------------------------------------
# Provider routing — Gemma→NextBit; Kimi→SiliconFlow (fp8) + ModelRun fast fallback
# -------------------------------------------------------------------
# Top-level `provider_routing` (verified cli.py:3608) → OpenRouter `extra_body.provider`.
# There is ONE `order` list per profile — a single global preferred-provider chain for ALL models.
# OpenRouter picks the first provider in the list that serves the requested model:
#   - nextbit     → Gemma daily. bf16, 99.7% uptime; serves Gemma but NOT Kimi — the whole point:
#                   it can't hijack the Kimi pin (Novita would — it serves both).
#   - siliconflow → Kimi careful PRIMARY. The only fp8 Kimi K2.6 endpoint (rest are int4/fp4/unknown),
#                   ZDR-listed — chosen for quality at the careful tier. BUT measured 2026-06-23 it is the
#                   SLOWEST + LEAST RELIABLE Kimi endpoint of 20: TTFT p50 5.9s (p90 12.7s), 26 tok/s, 89%
#                   uptime — so a careful answer takes ~30s and ~11% of calls would fail without a fallback.
#   - modelrun    → Kimi careful FALLBACK. fp4, ZDR, 0.5s TTFT, 87 tok/s, 99.9% uptime, $3.40, and verified
#                   reasoning-capable (6/6 with reasoning:high 2026-06-23). Deterministic fast rescue for
#                   SiliconFlow's downtime so an escalation never fails. NOTE: most "listed" Kimi providers
#                   ERROR when reasoning is ON (DeepInfra, Parasail) — unusable for the careful tier; only
#                   ModelRun + Together passed. ModelRun chosen over Together (confirmed fp4 vs unknown quant,
#                   cheaper). The fallback is fp4 (a quant step below fp8) — acceptable on the rare outage path.
# allow_fallbacks stays ON (default). Use `order`, NOT `only`. Lowercase slugs verified to route 2026-06-23.
#
# CAVEAT — "one pin per profile" (flagged by the teacher-admin Hermes agent, confirmed 2026-06-23):
# because `order` is global, a Gemma daily provider that ALSO served Kimi would force Kimi onto it and
# break the fp8 pin. We avoid that here by picking NextBit (Gemma-only). If a FUTURE profile's daily
# provider overlaps its careful model, a static list can't separate them — the model-escalation skill
# must re-pin provider_routing at `/model careful` time (dynamic), then revert at `/model default`.
# Does NOT propagate to aux slots (independent, by Hermes design).
provider_routing:
  order:
    - nextbit       # Gemma daily — bf16, 99.7% uptime; does NOT serve Kimi (keeps the pins separate)
    - siliconflow   # Kimi careful PRIMARY — fp8 (best quant, but slow: 5.9s TTFT, 89% uptime)
    - modelrun      # Kimi careful FALLBACK — fp4, fast (0.5s TTFT, 87 tok/s), 99.9% uptime, reasoning-capable

# -------------------------------------------------------------------
# Model aliases — student vocabulary for /model
# -------------------------------------------------------------------
# `default` (everyday) — Gemma 4 26B.
# `careful` (wizard)  — Kimi K2.6 (plain id; was the now-removed @preset). The
#   `model-escalation` skill prompts `/model careful` at the named high-judgment moments;
#   `/model default` returns. With persist_switch_by_default:false these are session-only.
model_aliases:
  default:
    provider: openrouter
    model: google/gemma-4-26b-a4b-it
  careful:
    provider: openrouter
    model: moonshotai/kimi-k2.6

# -------------------------------------------------------------------
# Delegation — the model subagents (delegate_task) run on
# -------------------------------------------------------------------
# PINNED to Gemma (defensive, v0.3.6 2026-06-25). Empty would mean subagents inherit the session's
# CURRENT main model (full agent loop, not a router; verified delegate_tool.py) — so during a
# `/model careful` escalation a subagent would follow up to Kimi. v0.17.0 makes top-level delegation
# BACKGROUND-BY-DEFAULT, and the curriculum is NOT adopting subagent delegation (decision-log
# 2026-06-25 — DEFER); pinning Gemma is a cheap floor so any stray/learned delegation stays cheap and
# can't bleed to the Wizard tier. (Reverses the prior deliberate-empty choice; the mentor delegates
# rarely, so the floor costs nothing. research-agent was already pinned; review-agent at Tier 3.)
delegation:
  provider: openrouter
  model: google/gemma-4-26b-a4b-it

# -------------------------------------------------------------------
# Auxiliary task slots — all 14 pinned to Gemma 4 26B
# -------------------------------------------------------------------
# Pinned explicitly (not auto/inherit) so a `/model careful` upgrade never bleeds the
# background jobs up to the Wizard tier. Hermes exposes 14 slots (verified 2026-06-23 — the
# earlier config pinned only 8). Empirically validated 2026-06-20 (aux_test.py): gemma-4-26b
# is adequate on the high-stakes slots (compression, approval, vision). NOTE: `curator` here
# is the aux-job *model* slot, distinct from the top-level `curator.enabled` below.
auxiliary:
  vision:             { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  web_extract:        { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  compression:        { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  skills_hub:         { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  approval:           { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  mcp:                { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  title_generation:   { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  tts_audio_tags:     { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  triage_specifier:   { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  kanban_decomposer:  { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  profile_describer:  { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  curator:            { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  monitor:            { provider: openrouter, model: google/gemma-4-26b-a4b-it }
  session_search:     { provider: openrouter, model: google/gemma-4-26b-a4b-it }

# -------------------------------------------------------------------
# Prompt caching — 1-hour TTL (Claude-only mechanism; moot for this profile)
# -------------------------------------------------------------------
# Every tier here is non-Claude (Gemma / Kimi), so nothing auto-caches. Harmless; kept for
# consistency across profiles (teacher-admin runs Opus and benefits).
prompt_caching:
  cache_ttl: "1h"

# -------------------------------------------------------------------
# Terminal — shared workspace (student-install.sh rewrites cwd)
# -------------------------------------------------------------------
terminal:
  backend: local
  cwd: /CHANGE_ME/research-curriculum
  timeout: 180

# -------------------------------------------------------------------
# Curator (top-level) — skill-pruning curator, disabled on student profiles
# -------------------------------------------------------------------
# Distinct from auxiliary.curator above (that's the model the curator job uses). This switch
# disables the v0.16.0 skill-pruning behavior so rarely-invoked curriculum skills aren't pruned.
curator:
  enabled: false
