# Project Mentor — Hermes profile distribution manifest
#
# Packages this profile as an installable Hermes agent. Anyone with access
# to the GitHub repo can install the whole agent — SOUL, config, skills,
# cron, mcp.json — with one command:
#
#     hermes profile install github.com/ScottSavaiano/project-mentor --alias
#
# When the educator tags a new version, students run:
#
#     hermes profile update project-mentor
#
# …and their installed mentor updates to the new SOUL and skills while
# their own conversation history, memories, and config tuning are preserved.

# -------------------------------------------------------------------
# Identity
# -------------------------------------------------------------------

name: project-mentor

# Version follows semver. v0.x while the mentor is still being built out;
# v1.0.0 is reserved for the first release that ships all Tier 1 skills.
version: 0.7.0
